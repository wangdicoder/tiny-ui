<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="favicon.ico"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <meta name="theme-color" content="#000000"/>
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Tiny UI | A Friendly UI Component Set for React</title>
    <meta name="keywords" content="tiny-ui, tinyui, tiny, tiny-ui.js, react.js, react, component, components, ui, framework, toolkit">
    <meta name="description" content="tiny-ui, a friendly UI component set for React.js">
    <script>
        // Prevent flash of wrong theme on page load
        (function() {
            var theme = localStorage.getItem('ty-theme');
            if (theme === 'dark' || theme === 'light') {
                document.documentElement.setAttribute('data-theme', theme);
            }
        })();
    </script>
</head>
<body>
<noscript>You need to enable JavaScript to run this app.</noscript>
<div id="root"></div>
</body>
</html>
